name: claracore

services:
  claracore:
    build:
      context: ..
      dockerfile: docker-cpu/Dockerfile.cpu
    container_name: claracore-cpu
    image: claracore:cpu
    restart: unless-stopped
    # ClaraCore writes its state (config.yaml, model_folders.json, settings.json,
    # progress_state.json) relative to the working directory, so run it from the
    # persistent /data volume below.
    working_dir: /data
    ports:
      - "5890:5890"
    volumes:
      # Persistent state: config.yaml, model_folders.json, settings.json, etc.
      - claracore-cpu-data:/data

      # Persistent volume for downloaded models (kept under the working dir)
      - claracore-cpu-downloads:/data/downloads
      
      # Optional: Bind mount your own model folders
      # Uncomment and customize the paths below to use your existing models
      - /mnt/models/ggufs:/app/models:ro          # Read-only access
      # - /mnt/storage/llm-models:/app/external:ro     # Another folder
      # - ~/ai-models:/app/my-models:ro                # Home directory models
      
    environment:
      # CPU-specific optimizations
      - OMP_NUM_THREADS=auto
      - GGML_BLAS=0

volumes:
  # Persistent ClaraCore state (config, folder DB, settings). Survives 'down'.
  # To reset configuration: docker-compose down -v (also deletes downloads!)
  claracore-cpu-data:
    name: claracore-cpu-data

  # Persistent storage for downloaded models only
  # This volume persists even after 'docker-compose down'
  # To delete: docker-compose down -v (WARNING: deletes all downloaded models!)
  claracore-cpu-downloads:
    name: claracore-cpu-downloads

# ============================================================
# 📁 BINDING YOUR OWN MODEL FOLDERS
# ============================================================
# To use your existing model folders, uncomment the volume binds above
# and replace the paths with your actual directories:
#
# Examples:
#   Linux:   - /mnt/data/models:/app/models:ro
#   Windows: - C:\Users\YourName\Models:/app/models:ro
#   macOS:   - /Users/yourname/ai-models:/app/models:ro
#
# Tips:
#   - Use :ro (read-only) to prevent accidental modifications
#   - You can mount multiple folders to different paths
#   - After adding folders, go to Setup and scan them
#   - Paths inside container: /app/models, /app/external, etc.
#
# ============================================================
